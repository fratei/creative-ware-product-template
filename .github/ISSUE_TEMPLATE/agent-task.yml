name: Agent Task
description: Structured task for autonomous agents
title: "[AGENT] "
labels:
  - copilot
  - agent/orchestrator
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What outcome should be achieved?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and files
      description: Include exact files and directories the agent may modify.
      placeholder: |
        - .github/workflows/**
        - src/**
        - docs/**
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and guardrails
      description: Include non-goals, security constraints, and risk tolerance.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation commands
      description: Existing lint/build/test commands the agent must run.
      placeholder: |
        npm run lint --if-present
        npm test --if-present
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Definition of done
      description: Checklist the PR must satisfy.
      value: |
        - [ ] Minimal scoped changes
        - [ ] Existing validations pass
        - [ ] Docs/config updated if needed
        - [ ] Risk + rollback notes included in PR
    validations:
      required: true
