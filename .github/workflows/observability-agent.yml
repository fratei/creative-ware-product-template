# TODO: Switch @main to @v1 once framework v1.0.0 is tagged in fratei/creative-ware-hq.
name: "👁️ Observability Agent"
on:
  schedule:
    - cron: "30 */2 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  observability:
    uses: fratei/creative-ware-hq/.github/workflows/reusable-observability.yml@main
    with:
      product_name: "{{PRODUCT_NAME}}"
      dashboard_path: docs/agents/DASHBOARD.md
    secrets: inherit
