name: "👁️ Observability Agent"

on:
  schedule:
    - cron: "30 */2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}

      - name: "📊 Update Dashboard"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const now = new Date().toISOString();
            const today = now.split('T')[0];

            // Gather metrics
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', per_page: 100,
            });
            const bugs = openIssues.filter(i => i.labels?.some(l => l.name === 'bug'));
            const features = openIssues.filter(i => i.labels?.some(l => l.name === 'feature'));
            const incidents = openIssues.filter(i => i.labels?.some(l => l.name === 'incident'));

            const { data: openPRs } = await github.rest.pulls.list({
              owner, repo, state: 'open', per_page: 50,
            });

            const { data: closedPRs } = await github.rest.pulls.list({
              owner, repo, state: 'closed', sort: 'updated', direction: 'desc', per_page: 20,
            });
            const mergedToday = closedPRs.filter(pr =>
              pr.merged_at && pr.merged_at >= `${today}T00:00:00Z`
            ).length;

            // Build dashboard
            const dashboard = [
              `# 📊 {{PRODUCT_NAME}} Agent Dashboard`,
              ``,
              `> Auto-updated by Observability Agent every 2h. Do not edit manually.`,
              ``,
              `## Issue Metrics`,
              ``,
              `| Category | Open |`,
              `|----------|------|`,
              `| 🐛 Bugs | ${bugs.length} |`,
              `| ✨ Features | ${features.length} |`,
              `| 🚨 Incidents | ${incidents.length} |`,
              ``,
              `## PR Metrics`,
              ``,
              `| Metric | Value |`,
              `|--------|-------|`,
              `| Open PRs | ${openPRs.length} |`,
              `| Merged today | ${mergedToday} |`,
              ``,
              `---`,
              `*Last updated: ${now}*`,
              `*Generated by Observability Agent — CreativeWare*`,
            ].join('\n');

            fs.mkdirSync('docs/agents', { recursive: true });
            fs.writeFileSync('docs/agents/DASHBOARD.md', dashboard);

            try {
              execSync('git config user.name "CreativeWare Bot"');
              execSync('git config user.email "bot@creativware.ai"');
              execSync('git add docs/agents/DASHBOARD.md');
              const diff = execSync('git diff --cached --name-only').toString().trim();
              if (diff) {
                execSync('git commit -m "chore: update dashboard [skip ci]"');
                execSync('git push origin HEAD:main');
              }
            } catch (e) {
              console.log(`Dashboard update failed (non-fatal): ${e.message}`);
            }
