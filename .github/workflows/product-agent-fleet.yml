# TODO: Switch back to reusable workflow once `fratei/creative-ware-hq` publishes the `v1` tag.
# The reusable workflow `reusable-product-fleet.yml@main` internally references
# `fratei/creative-ware-hq/.github/actions/load-config@v1`, which fails to resolve because
# no `v1` tag exists yet. Until that tag is published this consumer is replaced with a
# placeholder no-op so scheduled runs stop producing `startup_failure` noise.
name: "🏢 Product Agent Fleet"
on:
  workflow_dispatch:
    inputs:
      agent:
        type: choice
        options: [all, cpo, cfo, cto]
        default: all
  repository_dispatch:
    types: [agent-fleet-trigger]
permissions:
  contents: read
  issues: write

concurrency:
  group: product-fleet-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  product-fleet-placeholder:
    name: Product fleet (degraded — awaiting HQ v1)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Note degraded mode
        run: |
          echo "ℹ️ Product Agent Fleet is in placeholder mode."
          echo "   Reason: fratei/creative-ware-hq has no 'v1' tag yet, so the reusable"
          echo "           workflow 'reusable-product-fleet.yml@main' fails at startup."
          echo "   Action: Once HQ publishes 'v1', restore the reusable-workflow consumer"
          echo "           and re-enable the scheduled trigger."
          echo "   See: docs/agents/AUTONOMY-ADMIN-CHECKLIST.md (section 9)."
