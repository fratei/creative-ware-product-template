# TODO: Switch @main to @v1 once framework v1.0.0 is tagged in fratei/creative-ware-hq.
name: "🏢 Product Agent Fleet"
on:
  schedule:
    - cron: "15 */6 * * *"
  workflow_dispatch:
    inputs:
      agent: { type: choice, options: [all, cpo, cfo, cto], default: all }
  repository_dispatch:
    types: [agent-fleet-trigger]
permissions:
  contents: read
  issues: write
jobs:
  product-fleet:
    uses: fratei/creative-ware-hq/.github/workflows/reusable-product-fleet.yml@main
    with:
      agent: ${{ inputs.agent || 'all' }}
    secrets: inherit
