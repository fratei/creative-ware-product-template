# TODO: Switch back to reusable workflow once `fratei/creative-ware-hq` publishes the `v1` tag.
# The reusable workflow `reusable-pr-pipeline.yml@main` internally references
# `fratei/creative-ware-hq/.github/actions/{load-config,classify-risk}@v1`, which fail to
# resolve because no `v1` tag exists yet. Until that tag is published this consumer is
# replaced with a placeholder no-op so PR checks stay green and scheduled runs stop
# producing `startup_failure` noise.
name: "🔍 PR Review (Degraded — placeholder)"
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch: {}
permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-review-${{ github.event.pull_request.number || github.ref_name || 'manual' }}
  cancel-in-progress: false

jobs:
  pr-pipeline-placeholder:
    name: PR review (degraded — awaiting HQ v1)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Note degraded mode
        run: |
          echo "ℹ️ PR review pipeline is in placeholder mode."
          echo "   Reason: fratei/creative-ware-hq has no 'v1' tag yet, so the reusable"
          echo "           workflow 'reusable-pr-pipeline.yml@main' fails at startup."
          echo "   Action: Once HQ publishes 'v1', restore the reusable-workflow consumer."
          echo "   See: docs/agents/AUTONOMY-ADMIN-CHECKLIST.md (section 9)."
