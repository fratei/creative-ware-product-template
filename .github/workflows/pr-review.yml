# TODO: Switch @main to @v1 once framework v1.0.0 is tagged in fratei/creative-ware-hq.
name: "🔍 PR Review & Auto-Merge"
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "*/30 * * * *"
permissions:
  contents: write
  pull-requests: write
  issues: write
jobs:
  pr-pipeline:
    uses: fratei/creative-ware-hq/.github/workflows/reusable-pr-pipeline.yml@main
    secrets: inherit
